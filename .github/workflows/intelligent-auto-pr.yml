name: CI - Validate Static Site

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate HTML & Assets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "## File Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          PASS=true

          for file in index.html robots.txt sitemap.xml; do
            if [ -f "$file" ]; then
              echo "- [x] \`$file\` exists" >> $GITHUB_STEP_SUMMARY
            else
              echo "- [ ] \`$file\` is missing" >> $GITHUB_STEP_SUMMARY
              PASS=false
            fi
          done

          if [ "$PASS" = false ]; then
            echo ""
            echo "Some required files are missing." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All required files present." >> $GITHUB_STEP_SUMMARY

      - name: Validate HTML structure
        run: |
          echo "Validating index.html structure..."

          # Check for DOCTYPE
          if ! head -1 index.html | grep -qi 'doctype'; then
            echo "::error::Missing DOCTYPE declaration"
            exit 1
          fi

          # Check for essential meta tags
          for tag in 'charset' 'viewport' '<title>'; do
            if ! grep -qi "$tag" index.html; then
              echo "::error::Missing $tag in index.html"
              exit 1
            fi
          done

          echo "HTML structure is valid."

      - name: Validate sitemap.xml
        run: |
          echo "Validating sitemap.xml..."

          if ! head -1 sitemap.xml | grep -q '<?xml'; then
            echo "::error::sitemap.xml is not valid XML"
            exit 1
          fi

          echo "sitemap.xml is valid."

      - name: Validate robots.txt
        run: |
          echo "Validating robots.txt..."

          if ! grep -qi 'user-agent' robots.txt; then
            echo "::error::robots.txt missing User-agent directive"
            exit 1
          fi

          echo "robots.txt is valid."

      - name: Report success
        if: success()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "All validations passed." >> $GITHUB_STEP_SUMMARY
