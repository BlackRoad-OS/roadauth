name: Scheduled Link & Health Check

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    name: Check Sitemap Links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract and check sitemap URLs
        id: links
        run: |
          echo "## Link Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ ! -f "sitemap.xml" ]; then
            echo "No sitemap.xml found, skipping." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          FAILURES=0
          TOTAL=0

          # Extract URLs from sitemap
          URLS=$(grep -oP '(?<=<loc>)[^<]+' sitemap.xml || true)

          for url in $URLS; do
            TOTAL=$((TOTAL + 1))
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "- [x] \`$url\` (HTTP $HTTP_CODE)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- [ ] \`$url\` (HTTP $HTTP_CODE)" >> $GITHUB_STEP_SUMMARY
              FAILURES=$((FAILURES + 1))
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Checked $TOTAL URLs, $FAILURES failed." >> $GITHUB_STEP_SUMMARY

          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: Create issue on failures
        if: steps.links.outputs.failures != '0' && steps.links.outputs.failures != ''
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Link Check: ' + '${{ steps.links.outputs.failures }}' + ' broken link(s) found';
            const body = [
              '## Broken Links Detected',
              '',
              '${{ steps.links.outputs.failures }} out of ${{ steps.links.outputs.total }} URLs from sitemap.xml returned errors.',
              '',
              'Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.',
              '',
              '---',
              '*Detected by weekly link check*'
            ].join('\n');

            // Avoid duplicate issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'broken-links'
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['broken-links']
              });
            }
